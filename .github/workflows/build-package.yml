name: Build and publish go-hardware-driver package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout GOcontroll-CodeBase
        uses: actions/checkout@v4
        with:
          repository: GOcontroll/GOcontroll-CodeBase
          path: codebase

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gcc-aarch64-linux-gnu

      - name: Build binary
        run: make GO_BASE=$GITHUB_WORKSPACE/codebase

      - name: Build .deb
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE=go-hardware-driver
          ARCH=arm64
          BUILD="${RUNNER_TEMP}/${PACKAGE}_${VERSION}_${ARCH}"
          DIST="${RUNNER_TEMP}/dist"

          mkdir -p "${BUILD}/DEBIAN" \
                   "${BUILD}/usr/bin" \
                   "${BUILD}/usr/lib/systemd/system" \
                   "${DIST}"

          # --- Files --------------------------------------------------------------
          install -Dm755 build/go-hardware-driver \
            "${BUILD}/usr/bin/go-hardware-driver"
          install -Dm644 debian/go-hardware-driver.service \
            "${BUILD}/usr/lib/systemd/system/go-hardware-driver.service"

          # --- DEBIAN/control -----------------------------------------------------
          cat > "${BUILD}/DEBIAN/control" << CONTROL
          Package: ${PACKAGE}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: GOcontroll B.V. <info@gocontroll.com>
          Section: misc
          Priority: optional
          Homepage: https://gocontroll.com
          Description: Generic driver for GOcontroll plug-in modules
           Reads /usr/lib/firmware/gocontroll/modules.json (schema v1.0),
           instantiates per-slot module drivers, and publishes/reads values via
           /dev/shm/gocontroll/. Supports input-6ch and output-6ch; stubs for
           input-10ch, input-4-20ma, output-10ch and bridge-2ch.
          CONTROL

          # --- DEBIAN/postinst ----------------------------------------------------
          cat > "${BUILD}/DEBIAN/postinst" << 'POSTINST'
          #!/bin/bash
          set -e
          case "$1" in
              configure)
                  systemctl daemon-reload
                  systemctl enable go-hardware-driver.service
                  systemctl restart go-hardware-driver.service || true
                  ;;
          esac
          POSTINST
          chmod 755 "${BUILD}/DEBIAN/postinst"

          # --- DEBIAN/prerm -------------------------------------------------------
          cat > "${BUILD}/DEBIAN/prerm" << 'PRERM'
          #!/bin/bash
          set -e
          case "$1" in
              remove|purge)
                  systemctl stop go-hardware-driver.service || true
                  systemctl disable go-hardware-driver.service || true
                  ;;
          esac
          PRERM
          chmod 755 "${BUILD}/DEBIAN/prerm"

          # --- DEBIAN/postrm ------------------------------------------------------
          cat > "${BUILD}/DEBIAN/postrm" << 'POSTRM'
          #!/bin/bash
          set -e
          case "$1" in
              purge)
                  systemctl daemon-reload || true
                  ;;
          esac
          POSTRM
          chmod 755 "${BUILD}/DEBIAN/postrm"

          # --- Build --------------------------------------------------------------
          dpkg-deb -Zxz --build --root-owner-group "${BUILD}" \
            "${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/dist/go-hardware-driver_${{ steps.version.outputs.version }}_arm64.deb
          generate_release_notes: true

      - name: Trigger go-apt index rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.APT_DISPATCH_TOKEN }}
          repository: GOcontroll/go-apt
          event-type: rebuild-index
          client-payload: |
            {
              "package": "go-hardware-driver",
              "version": "${{ steps.version.outputs.version }}",
              "arch": "arm64",
              "deb_url": "https://github.com/GOcontroll/go-hardware-driver/releases/download/${{ github.ref_name }}/go-hardware-driver_${{ steps.version.outputs.version }}_arm64.deb"
            }
